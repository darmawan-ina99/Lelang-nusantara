<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pemberitahuan - Lelang Nusantara</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a1a0f;
            --accent-red: #e63946;
            --accent-gold: #d4a843;
            --text-light: #f0efe9;
            --text-muted: #b8c4b0;
            --glass-bg: rgba(10, 26, 15, 0.85);
            --glass-border: rgba(212, 168, 67, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== GAMBAR: FIT ON SCREEN (tidak terpotong) ===== */
        .bg-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            background: var(--bg-dark);
            /* beri ruang di bawah supaya tidak ketutup panel keterangan */
            padding-bottom: 220px;
        }

        .bg-wrap img {
            width: 100%;
            height: auto;
            max-width: 100%;
            display: block;
            object-fit: contain;
        }

        /* ===== Overlay gelap tipis di atas gambar (tidak menutupi teks) ===== */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 2;
            background:
                linear-gradient(
                    to bottom,
                    rgba(0, 0, 0, 0.12) 0%,
                    rgba(0, 0, 0, 0.0) 25%,
                    rgba(0, 0, 0, 0.0) 70%,
                    rgba(0, 0, 0, 0.55) 100%
                );
            pointer-events: none;
        }

        /* ===== Top Bar ===== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
            opacity: 0;
            animation: fadeIn 0.5s ease 0.2s forwards;
        }

        .top-bar .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 14px;
            color: var(--text-light);
            letter-spacing: 0.03em;
        }
